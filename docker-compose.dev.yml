version: '3.8'

services:
  api:
    image: ${DOCKERHUB_USERNAME}/ci-cd-api:${IMAGE_TAG:-latest}
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s