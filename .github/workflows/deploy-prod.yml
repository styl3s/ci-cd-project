name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy'
        required: true
        default: 'latest'

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Trigger Railway Deployment
        run: |
          echo "✅ Deploying image tag: ${{ inputs.image_tag }}"
          echo "Railway configured to use: styl3s/ci-cd-api:${{ inputs.image_tag }}"
          echo "Production will auto-update when image is available"
          
      - name: Wait for Railway auto-deployment
        run: sleep 30
      
      - name: Health check
        run: |
          curl -f https://api-production-bb06.up.railway.app/health || echo "Deployment still processing"