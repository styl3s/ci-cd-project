name: Deploy to Development

on:
  push:
    branches: [dev]

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Trigger Railway Deployment
        run: |
          echo "✅ New image pushed to Docker Hub: styl3s/ci-cd-api:latest"
          echo "Railway auto-deploys when detecting new image"
          echo "Dev environment: https://api-production-3ebb.up.railway.app"
          
      - name: Wait for Railway auto-deployment
        run: sleep 30
      
      - name: Health check
        run: |
          curl -f https://api-production-3ebb.up.railway.app/health || echo "Deployment still processing"